services:
  postgres:
    image: postgres:16-alpine
    container_name: ello-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ello
      POSTGRES_USER: ello
      POSTGRES_PASSWORD: 12345678
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ello -d ello"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ello-redis
    restart: unless-stopped
    command: redis-server --requirepass 12345678
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 12345678 ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ello-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEBUG: "true"
      DB_URL: postgresql+asyncpg://ello:12345678@postgres:5432/ello
      JWT_SECRET_KEY: local-dev-secret-key-local-dev-secret
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "240"
      JWT_ISSUER: app
      JWT_AUDIENCE: app
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      CORS_ORIGINS: '["http://localhost:3000"]'
      LOG_LEVEL: INFO
      LOG_FILE: logs/app.log
      LOG_MAX_SIZE: "10485760"
      REDIS_URL: redis://:12345678@redis:6379/0
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: ello-bot-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_ENVIRONMENT: local
      AI_RECORD_CONTENT: "false"
      AI_CONTENT_PREVIEW_CHARS: "500"
      AI_DEFAULT_TIMEOUT_MS: "60000"
      AI_TECHNICAL_RETRY_COUNT: "1"
      AI_TECHNICAL_RETRY_BACKOFF_MS: "250"
      AI_OPENAI__API_KEY: ""
      AI_OPENAI__BASE_URL: https://api.openai.com/v1
      AI_ANTHROPIC__API_KEY: ""
      AI_ANTHROPIC__BASE_URL: https://api.anthropic.com/v1
      AI_ANTHROPIC__API_VERSION: "2023-06-01"
      AI_GEMINI__API_KEY: ""
      AI_GEMINI__BASE_URL: https://generativelanguage.googleapis.com/v1beta
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_APP_API_URL: http://localhost:8000/api
        VITE_APP_URL: http://localhost:3000
    container_name: ello-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
