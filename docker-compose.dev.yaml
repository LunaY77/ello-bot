services:
  postgres:
    image: postgres:16-alpine
    container_name: ello-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ello
      POSTGRES_USER: ello
      POSTGRES_PASSWORD: 12345678
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ello -d ello"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ello-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg2://ello:12345678@postgres:5432/ello
      SECRET_KEY: local-dev-secret-key-local-dev-secret
      HOST: 0.0.0.0
      PORT: 8000
      JWT_ISSUER: app
      JWT_AUDIENCE: app
      CORS_ORIGINS: '["http://localhost:3000"]'
      LOG_LEVEL: INFO
      LOG_FILE: logs/app.log
      LOG_MAX_SIZE: 10485760
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_APP_API_URL: http://localhost:8000/api
        VITE_APP_URL: http://localhost:3000
        VITE_APP_ENABLE_API_MOCKING: "false"
    container_name: ello-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
