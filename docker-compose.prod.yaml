services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./deploy/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ello} -d ${POSTGRES_DB:-ello}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ghcr.io/${GHCR_OWNER:-lunay77}/ello-bot-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ./deploy/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    image: ghcr.io/${GHCR_OWNER:-lunay77}/ello-bot-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
